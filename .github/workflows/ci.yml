name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP Syntax Check
        run: |
          errors=0
          for file in $(find . -name "*.php" -not -path "./vendor/*"); do
            php -l "$file" > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              php -l "$file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors files with syntax errors"
            exit 1
          fi
          echo "All PHP files pass syntax check"
